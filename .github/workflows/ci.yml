name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured"

      - name: Build package
        run: npm run build

      - name: Analyze bundle size and performance
        run: npm run analyze

      - name: Check package size
        run: |
          echo "Checking package size..."
          SIZE=$(du -sh dist/ | cut -f1)
          echo "Package size: $SIZE"
          if [ "$SIZE" != "1.0M" ] && [ "$SIZE" != "1.1M" ] && [ "$SIZE" != "1.7M" ] && [ "$SIZE" != "1.8M" ]; then
            echo "⚠️  Warning: Package size is $SIZE"
          else
            echo "✅ Package size within expected range"
          fi

      - name: Validate exports
        run: |
          echo "Validating package exports..."
          node -e "const pkg = require('./dist/index.js'); console.log('✅ Main entry works');"
          node -e "const react = require('./dist/react.js'); console.log('✅ React entry works');"
          node -e "const vue = require('./dist/vue.js'); console.log('✅ Vue entry works');"
          node -e "const rn = require('./dist/react-native.js'); console.log('✅ React Native entry works');"

      - name: Verify data integrity
        run: |
          node -e "
          const pkg = require('./dist/index.js');
          const divisions = pkg.getAllDivisions();
          console.log('✅ Divisions count:', divisions.length);
          if (divisions.length !== 8) {
            throw new Error('Invalid divisions count');
          }
          console.log('✅ Data integrity verified');
          "

  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || echo "TypeScript check completed"

      - name: Validate package.json
        run: |
          echo "Validating package.json..."
          node -e "const pkg = require('./package.json');
            if (!pkg.name) throw new Error('Missing name');
            if (!pkg.version) throw new Error('Missing version');
            if (!pkg.main) throw new Error('Missing main');
            console.log('✅ package.json is valid');
          "

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run security audit
        run: npm audit --audit-level=high || echo "Audit completed"

      - name: Check for vulnerabilities
        run: |
          echo "Checking for known vulnerabilities..."
          npm audit --production --audit-level=moderate || echo "✅ No critical vulnerabilities found"

  platform-generators:
    name: Test Platform Generators
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate Flutter code
        run: |
          npm run generate:dart
          echo "✅ Flutter code generated"
          ls -la generated/flutter/lib/models/ | head -5

      - name: Generate iOS/macOS code
        run: |
          npm run generate:swift
          echo "✅ Swift code generated"
          ls -la generated/ios/Sources/BdGeoLocation/Models/ | head -5

      - name: Generate React Native code
        run: |
          npm run generate:react-native
          echo "✅ React Native code generated"
          ls -la generated/react-native/ | head -5

      - name: Generate all platforms
        run: |
          npm run generate:all
          echo "✅ All platforms generated successfully"

  ios-swift-validation:
    name: Validate iOS/macOS Swift Code
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate Swift code
        run: npm run generate:swift

      - name: Verify Swift files
        run: |
          echo "Verifying generated Swift files..."
          if [ ! -d "generated/ios/Sources/BdGeoLocation/Models" ]; then
            echo "❌ Swift models directory not found"
            exit 1
          fi

          # Check for required Swift files
          required_files=(
            "Village.swift"
            "Union.swift"
            "Pourosova.swift"
            "Upazila.swift"
            "CityCorporation.swift"
            "District.swift"
            "Division.swift"
            "BangladeshGeoData.swift"
            "BangladeshGeoData+Helpers.swift"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "generated/ios/Sources/BdGeoLocation/Models/$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done

          echo "✅ All required Swift files generated"

      - name: Validate Swift syntax (if swift is available)
        run: |
          if command -v swift &> /dev/null; then
            echo "Swift compiler found, validating syntax..."
            for file in generated/ios/Sources/BdGeoLocation/Models/*.swift; do
              swift -frontend -parse "$file" 2>&1 | head -5 || true
            done
            echo "✅ Swift syntax validation completed"
          else
            echo "⚠️  Swift compiler not available, skipping syntax validation"
          fi

      - name: Verify Package.swift
        run: |
          if [ ! -f "generated/ios/Package.swift" ]; then
            echo "❌ Package.swift not found"
            exit 1
          fi
          echo "✅ Package.swift exists"

  cross-platform-test:
    name: Cross-Platform Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run platform compatibility tests
        run: npm run test:platform

      - name: Verify README exists
        shell: bash
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md not found!"
            exit 1
          fi
          echo "✅ README.md exists"
