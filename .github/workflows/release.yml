name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.2)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # Run comprehensive tests across all platforms before releasing
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run platform tests
        run: npm run test:platform

      - name: Test code generators
        run: |
          npm run generate:dart
          npm run generate:swift
          npm run generate:react-native

      - name: Verify package contents
        run: |
          echo "Checking package files..."
          npm pack --dry-run
          echo "✅ Package validation successful"

  # Create and publish release
  release:
    name: Create Release and Publish
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Analyze bundle size and performance
        run: npm run analyze

      - name: Verify README is included
        run: |
          echo "Verifying README.md is included in package..."
          node -e "const pkg = require('./package.json'); console.log('Files to include:', pkg.files);"
          if [ ! -f "README.md" ]; then
            echo "❌ README.md not found!"
            exit 1
          fi
          echo "✅ README.md exists and will be included in the package"

      - name: Validate package before publish
        run: |
          echo "Validating package..."
          npm pack --dry-run
          echo "✅ Package validation successful"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get version from tag or input
          VERSION=${{ github.ref_name }}
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          # Create release notes
          cat > release_notes.md << 'EOF'
          ## 🎉 Release ${{ github.ref_name }}

          Bangladesh Geo Location package - Complete geographical data for Bangladesh with multi-platform support.

          ### ✨ What's New

          - ✅ **Cross-platform support** - Works perfectly on Windows, Linux, and macOS
          - ✅ **React, Vue, Angular support** - Use with any frontend framework
          - ✅ **React Native components** - Ready-to-use mobile components
          - ✅ **Flutter/Dart code generator** - Generate Flutter models automatically
          - ✅ **iOS/macOS Swift generator** - Generate native iOS/macOS code
          - ✅ **English + Bengali names** - Complete bilingual support
          - ✅ **TypeScript support** - Full type definitions included
          - ✅ **Production-ready** - Tested and verified across all platforms

          ### 📦 Installation

          \`\`\`bash
          npm install bd-geo-location
          \`\`\`

          ### 🚀 Quick Start

          #### React
          \`\`\`typescript
          import { useDivisions, useDistricts } from 'bd-geo-location/react';

          function App() {
            const divisions = useDivisions();
            return <YourComponent divisions={divisions} />;
          }
          \`\`\`

          #### Vue
          \`\`\`typescript
          import { useDivisions } from 'bd-geo-location/vue';
          \`\`\`

          #### Angular/Vanilla
          \`\`\`typescript
          import { getAllDivisions } from 'bd-geo-location';
          \`\`\`

          #### React Native
          \`\`\`typescript
          import { LocationSelector } from 'bd-geo-location/react-native';
          \`\`\`

          ### 🔧 Platform Code Generators

          Generate platform-specific code:

          \`\`\`bash
          # Flutter (Dart)
          npm run generate:dart

          # iOS/macOS (Swift)
          npm run generate:swift

          # React Native components
          npm run generate:react-native

          # All platforms
          npm run generate:all
          \`\`\`

          ### 📚 Documentation

          - [Installation Guide](https://github.com/mazharvai007/bd-geo-location/blob/main/docs/INSTALLATION.md)
          - [Usage Guide](https://github.com/mazharvai007/bd-geo-location/blob/main/docs/USAGE_GUIDE.md)
          - [Quick Start](https://github.com/mazharvai007/bd-geo-location/blob/main/docs/QUICK_START.md)
          - [Cross-Platform Guide](https://github.com/mazharvai007/bd-geo-location/blob/main/CROSS_PLATFORM.md)

          ### 🌏 Data Coverage

          - ✅ 8 Divisions (বিভাগ)
          - ✅ 64 Districts (জেলা)
          - ✅ 495 Upazilas (উপজেলা)
          - ✅ City Corporations
          - ✅ Unions (ইউনিয়ন)
          - ✅ Pourosovas (পৌরসভা)
          - ✅ Villages (গ্রাম)

          ### 🧪 Testing

          All platforms tested and verified:
          - ✅ Windows (PowerShell, CMD, Git Bash)
          - ✅ Linux (Ubuntu, Debian, Fedora, etc.)
          - ✅ macOS (Intel, Apple Silicon)

          ### 📦 Package Contents

          This package includes:
          - Complete Bangladesh geo data (Divisions → Villages)
          - React hooks and components
          - Vue composables
          - React Native components
          - TypeScript definitions
          - Code generators for Flutter, iOS/macOS
          - **README.md** with full documentation

          ### 📄 License

          MIT License - See [LICENSE](https://github.com/mazharvai007/bd-geo-location/blob/main/LICENSE) for details.

          ### 🔗 Links

          - **npm**: https://www.npmjs.com/package/bd-geo-location
          - **GitHub**: https://github.com/mazharvai007/bd-geo-location
          - **Issues**: https://github.com/mazharvai007/bd-geo-location/issues

          ### 👨‍💻 Author

          Mazharul Islam

          ### 🙏 Thanks

          Thanks to all contributors and users of this package!
          EOF

          echo "✅ Release notes generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            README.md
            LICENSE
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          echo "✅ Package ${{ github.ref_name }} published successfully!"
          echo "📦 Available at: https://www.npmjs.com/package/bd-geo-location"
          echo "🎉 Release created: https://github.com/mazharvai007/bd-geo-location/releases/tag/${{ github.ref_name }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Release failed! Please check the logs above."
          exit 1
